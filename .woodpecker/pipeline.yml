when:
  - event: [push, pull_request, tag]

labels:
  platform: linux/amd64

steps:
  - name: test
    image: golang:1.26-bookworm
    environment:
      AUDIT_LOG_OTEL_ENABLED: "false"
      GITHUB_ACTIONS: "true"
    commands:
      - apt-get update && apt-get install -y netcat-openbsd curl ca-certificates
      - curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin --tag 1.40.0
      - just arch
      - just unit
      - just functional

  - name: publish-prepare
    image: alpine:3.21
    depends_on:
      - test
    when:
      - event: [push, tag]
        branch: main
    commands:
      - apk add --no-cache bash
      - |
        set -euo pipefail
        REPO_LC=$$(echo "$${CI_REPO}" | tr '[:upper:]' '[:lower:]')
        SHORT_SHA=$$(echo "$${CI_COMMIT_SHA}" | cut -c1-7)
        TAGS="sha-$${SHORT_SHA}"
        if [ "$${CI_PIPELINE_EVENT}" = "push" ] && [ "$${CI_COMMIT_BRANCH}" = "main" ]; then
          TAGS="$${TAGS},latest"
        fi
        if [ "$${CI_PIPELINE_EVENT}" = "tag" ]; then
          TAGS="$${TAGS},$${CI_COMMIT_TAG}"
          if echo "$${CI_COMMIT_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            VER=$$(echo "$${CI_COMMIT_TAG}" | sed 's/^v//')
            MAJ=$$(echo "$${VER}" | cut -d. -f1)
            MIN=$$(echo "$${VER}" | cut -d. -f2)
            TAGS="$${TAGS},$${VER},$${MAJ}.$${MIN},$${MAJ}"
          fi
        fi
        {
          echo "PLUGIN_REGISTRY=ghcr.io"
          echo "PLUGIN_REPO=ghcr.io/$${REPO_LC}"
          echo "PLUGIN_USERNAME=$${CI_REPO_OWNER}"
          echo "PLUGIN_TAGS=$${TAGS}"
          echo "PLUGIN_DOCKERFILE=Dockerfile"
          echo "PLUGIN_CONTEXT=."
          echo "PLUGIN_PLATFORMS=linux/amd64,linux/arm64"
        } > .plugin.env

  - name: publish
    image: woodpeckerci/plugin-docker-buildx:5
    privileged: true
    depends_on:
      - publish-prepare
    environment:
      PLUGIN_ENV_FILE: .plugin.env
      PLUGIN_PASSWORD:
        from_secret: ghcr_token
    when:
      - event: [push, tag]
        branch: main
