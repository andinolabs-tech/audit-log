when:
  - event: [push, pull_request, tag]

labels:
  platform: linux/amd64

steps:
  - name: test
    image: golang:1.26-bookworm
    environment:
      AUDIT_LOG_OTEL_ENABLED: "false"
      GITHUB_ACTIONS: "true"
    commands:
      - apt-get update && apt-get install -y netcat-openbsd curl ca-certificates
      - curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin --tag 1.40.0
      - just arch
      - just unit
      - just functional
