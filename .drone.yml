# Drone CI — mirrors .github/workflows/ci-docker.yml
#
# Required secret (Drone repository settings):
#   github_token — GitHub PAT with write:packages (or GITHUB_TOKEN–equivalent) for GHCR push
#
# Notes:
# - Postgres is reachable at hostname `postgres` (same as GHA service → localhost).
# - GITHUB_ACTIONS=true matches justfile so functional tests skip docker compose (DB is the Drone service).
# - Publish runs only on push/tag, not on pull_request (same as GHA `if: github.event_name != 'pull_request'`).
# - Publish ref filter matches push to main and tags (non–main branch pushes do not run publish).
# - Image build/push uses https://plugins.drone.io/plugins/docker (privileged: integrated Docker daemon).
# - Multi-arch: linux/amd64 + linux/arm64 (see `platform` on the publish step).

kind: pipeline
type: docker
name: default

platform:
  os: linux
  arch: amd64

services:
  - name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: auditlog

steps:
  - name: test
    image: golang:1.26-bookworm
    environment:
      AUDIT_LOG_DB_DSN: postgres://audit:audit@postgres:5432/auditlog?sslmode=disable
      AUDIT_LOG_DB_ADMIN_DSN: postgres://audit:audit@postgres:5432/auditlog?sslmode=disable
      AUDIT_LOG_OTEL_ENABLED: "false"
      GITHUB_ACTIONS: "true"
    commands:
      - apt-get update && apt-get install -y netcat-openbsd curl ca-certificates
      # Official installer (same family as GHA extractions/setup-just): picks the right arch (e.g. musl on linux/amd64).
      - curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin --tag 1.40.0
      - for i in $(seq 1 60); do nc -z postgres 5432 && break; sleep 1; done
      - just arch
      - just unit
      - just functional

  - name: publish-prepare
    image: alpine:3.21
    depends_on:
      - test
    when:
      event:
        exclude:
          - pull_request
      ref:
        include:
          - refs/heads/main
          - refs/tags/**
    commands:
      - apk add --no-cache bash
      - |
        set -euo pipefail
        REPO_LC=$$(echo "$${DRONE_REPO}" | tr '[:upper:]' '[:lower:]')
        SHORT_SHA=$$(echo "$${DRONE_COMMIT_SHA}" | cut -c1-7)
        TAGS="sha-$${SHORT_SHA}"
        if [ "$${DRONE_BUILD_EVENT}" = "push" ] && [ "$${DRONE_BRANCH}" = "main" ]; then
          TAGS="$${TAGS},latest"
        fi
        if [ "$${DRONE_BUILD_EVENT}" = "tag" ]; then
          TAGS="$${TAGS},$${DRONE_TAG}"
          if echo "$${DRONE_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            VER=$$(echo "$${DRONE_TAG}" | sed 's/^v//')
            MAJ=$$(echo "$${VER}" | cut -d. -f1)
            MIN=$$(echo "$${VER}" | cut -d. -f2)
            TAGS="$${TAGS},$${VER},$${MAJ}.$${MIN},$${MAJ}"
          fi
        fi
        {
          echo "PLUGIN_REPO=ghcr.io/$${REPO_LC}"
          echo "PLUGIN_REGISTRY=ghcr.io"
          echo "PLUGIN_USERNAME=$${DRONE_REPO_OWNER}"
          echo "PLUGIN_TAGS=$${TAGS}"
        } > .plugin.env

  - name: publish
    image: plugins/docker
    privileged: true
    depends_on:
      - publish-prepare
    environment:
      PLUGIN_ENV_FILE: .plugin.env
      PLUGIN_PASSWORD:
        from_secret: github_token
    settings:
      dockerfile: Dockerfile
      context: .
      platform: linux/amd64,linux/arm64
    when:
      event:
        exclude:
          - pull_request
      ref:
        include:
          - refs/heads/main
          - refs/tags/**

trigger:
  event:
    - push
    - pull_request
    - tag
